name: Nightly Differential Stress

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      rotation_date:
        description: 'Override UTC rotation date (YYYY-MM-DD)'
        required: false
        default: ''
      root_seed:
        description: 'Root seed for deterministic rotation'
        required: false
        default: '424242'
      seed_count:
        description: 'Number of rotated seeds to execute'
        required: false
        default: '4'
      seed_stride:
        description: 'Distance between derived seeds'
        required: false
        default: '9973'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TOOLCHAIN: nightly-2026-02-05

jobs:
  nightly-differential-stress:
    name: Nightly Differential Stress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-differential-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-differential-nightly-

      - name: Run nightly differential stress lane
        id: run_nightly
        shell: bash
        env:
          ROTATION_DATE: ${{ github.event.inputs.rotation_date || '' }}
          ROOT_SEED: ${{ github.event.inputs.root_seed || '424242' }}
          SEED_COUNT: ${{ github.event.inputs.seed_count || '4' }}
          SEED_STRIDE: ${{ github.event.inputs.seed_stride || '9973' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/lab-differential-nightly
          if [[ -z "${ROTATION_DATE}" ]]; then
            ROTATION_DATE="$(date -u +%F)"
          fi
          printf 'rotation_date=%s\n' "${ROTATION_DATE}" >> "${GITHUB_OUTPUT}"

          bash scripts/run_lab_live_differential.sh \
            --profile nightly-stress \
            --seed "${ROOT_SEED}" \
            --seed-count "${SEED_COUNT}" \
            --seed-stride "${SEED_STRIDE}" \
            --rotation-date "${ROTATION_DATE}" \
            --out-dir artifacts/lab-differential-nightly \
            | tee artifacts/lab-differential-nightly/nightly_stress.stdout.log

      - name: Summarize nightly differential stress lane
        if: always()
        shell: bash
        env:
          ROTATION_DATE: ${{ steps.run_nightly.outputs.rotation_date }}
        run: |
          set -euo pipefail
          manifest="artifacts/lab-differential-nightly/nightly-stress/${ROTATION_DATE}/nightly_stress_manifest.json"
          summary="artifacts/lab-differential-nightly/nightly-stress/${ROTATION_DATE}/nightly_stress_summary.txt"
          {
            echo "## Nightly Differential Stress"
            echo
            echo "- rotation_date: \`${ROTATION_DATE}\`"
            if [[ -f "${manifest}" ]]; then
              echo "- manifest: \`${manifest}\`"
              echo "- status: \`$(jq -r '.summary.status' "${manifest}")\`"
              echo "- total_runs: \`$(jq -r '.summary.total_runs' "${manifest}")\`"
              echo "- total_unexpected_divergence: \`$(jq -r '.summary.total_unexpected_divergence' "${manifest}")\`"
              echo "- total_missing_expected_divergence: \`$(jq -r '.summary.total_missing_expected_divergence' "${manifest}")\`"
              echo "- retained_divergence_artifacts: \`$(jq -r '.summary.retained_divergence_artifacts' "${manifest}")\`"
            else
              echo "- manifest missing: \`${manifest}\`"
            fi
            if [[ -f "${summary}" ]]; then
              echo
              echo '```text'
              cat "${summary}"
              echo '```'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload nightly differential stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab-live-differential-nightly-stress-artifacts
          path: artifacts/lab-differential-nightly/
          retention-days: 30
